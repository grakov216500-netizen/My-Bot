services:
  - type: worker
    name: course-bot
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python main.py"
    envVars:
      - key: TOKEN
        fromSecret: TOKEN
      - key: ADMIN_ID
        fromSecret: ADMIN_ID
    env:
      - DATABASE: bot.db
      - UPLOAD_FOLDER: uploads
